interface:
  display_name: "Obsidian Knowledge Ingest"
  short_description: "Import external materials into an Obsidian knowledge base"
  default_prompt: "Ingest this local directory, file, or URL into the active Obsidian knowledge vault after verifying the environment and required official obsidian-skills. Prefer defuddle for web URLs, and only suggest Computer Use as a fallback when anti-bot or dynamic pages block automated fetching. If Computer Use is unavailable or lacks permission, stop and ask the user to enable it instead of attempting installation automatically."
